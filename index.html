<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ CRITICAL FIX (stops zoom issue) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kam Code Generator</title>

<style>
:root {
  --bg: #0a0a0a;
  --card: #141414;
  --accent: #4cafef;
  --accent-dark: #389de0;
}

/* Layout */
body {
  margin: 0;
  font-family: "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Container */
.container {
  width: 100%;
  max-width: 420px;
  padding: 15px;
  box-sizing: border-box;
}

/* Cards */
.card {
  background: var(--card);
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 14px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* Typography */
h2 {
  text-align: center;
  margin: 0 0 14px;
  font-weight: 600;
}

label {
  font-size: 12px;
  opacity: 0.6;
}

/* Inputs */
input {
  width: 100%;
  padding: 11px;
  margin: 6px 0 12px;
  background: #1c1c1c;
  border: 1px solid #333;
  color: white;
  border-radius: 6px;
}

input:focus {
  border-color: var(--accent);
  outline: none;
}

/* Buttons */
button {
  width: 100%;
  padding: 11px;
  margin-top: 6px;
  background: var(--accent);
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: var(--accent-dark);
}

.secondary {
  background: #2e7d32;
}

.secondary:hover {
  background: #256628;
}

.row {
  display: flex;
  gap: 8px;
}

/* Code Display */
.code {
  font-size: clamp(28px, 6vw, 40px);
  text-align: center;
  letter-spacing: 5px;
  margin: 10px 0;
}

/* Info text */
.small {
  font-size: 13px;
  opacity: 0.7;
  text-align: center;
}

/* Progress bar */
.progress {
  height: 6px;
  background: #222;
  border-radius: 4px;
  overflow: hidden;
  margin-top: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.5s linear;
}

/* Status */
.status {
  text-align: center;
  font-size: 13px;
  margin-top: 8px;
}

.hidden { display: none; }

/* ✅ MOBILE SPECIFIC TUNING */
@media (max-width: 480px) {

  body {
    align-items: flex-start;
  }

  .container {
    padding: 10px;
  }

  .card {
    padding: 16px;
    border-radius: 10px;
  }

  button {
    padding: 13px;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card">
  <h2>Kam Code Generator</h2>

  <input id="password" type="password" placeholder="Password">

  <button onclick="unlock()">Unlock</button>
  <button onclick="hint()">Hint</button>

  <div id="status" class="status"></div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

<div class="card">
  <label>Shared Secret</label>
  <input id="secret">
</div>

<div class="card">
  <label>Select Time (Today)</label>
  <input id="timeOnly" type="time">

  <div class="row">
    <button onclick="applyTime()">Apply</button>
    <button class="secondary" onclick="resetTime()">Now</button>
  </div>

  <div class="small">Unix: <span id="unix"></span></div>
</div>

<div class="card">
  <div id="code" class="code">------</div>

  <button onclick="copyCode()">Copy Code</button>

  <div class="small">
    Remaining: <span id="remaining"></span>
  </div>

  <div class="progress">
    <div id="bar" class="bar"></div>
  </div>
</div>

</div>
</div>

<script>
const VALIDITY = 3600;
let time = Math.floor(Date.now()/1000);

// Unlock
function unlock() {
  const p = document.getElementById("password").value.toLowerCase();

  if (p === "kamikaze22" || p === "strayindex") {
    document.getElementById("main").classList.remove("hidden");

    document.getElementById("secret").value =
      "AIfVJHJmJxBL370G1blAfQ4yB9Cw3i+6EiA+mCzHMZrjCYsc";

    setStatus("Access granted", "#4caf50");
  } else {
    setStatus("Wrong password", "#ff5252");
  }
}

function hint() {
  setStatus("Hint: Your username", "#aaa");
}

function setStatus(text, color) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.style.color = color;
}

// Time
function applyTime() {
  const val = document.getElementById("timeOnly").value;
  if (!val) return;

  const d = new Date();
  const [h, m] = val.split(":");

  d.setHours(h, m, 0);
  time = Math.floor(d.getTime()/1000);
}

function resetTime() {
  time = Math.floor(Date.now()/1000);
  document.getElementById("timeOnly").value = "";
}

// Crypto
async function hmacSha1(key, msg) {
  const enc = new TextEncoder();
  const keyObj = await crypto.subtle.importKey(
    "raw", enc.encode(key),
    { name: "HMAC", hash: "SHA-1" },
    false, ["sign"]
  );
  return new Uint8Array(await crypto.subtle.sign("HMAC", keyObj, msg));
}

function toBytes(n) {
  const buf = new ArrayBuffer(8);
  new DataView(buf).setBigUint64(0, BigInt(n), false);
  return new Uint8Array(buf);
}

async function generate(secret, t) {
  const interval = Math.floor((t * 1000) / 3600000);
  const val = Math.floor((interval * 3600000) / 60000);

  const d = await hmacSha1(secret, toBytes(val));
  const o = d[d.length - 1] & 0xf;

  let r =
    ((d[o] & 0x7f) << 24) |
    (d[o+1] << 16) |
    (d[o+2] << 8) |
    (d[o+3]);

  return (r & 0x7fffffff) % 1000000;
}

// Helpers
function remaining(t) {
  return VALIDITY - (t % VALIDITY);
}

function format(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2,"0")}`;
}

// Copy
function copyCode() {
  const text = document.getElementById("code").textContent;
  navigator.clipboard.writeText(text);

  setStatus("Copied ✓", "#4caf50");
  setTimeout(()=>setStatus("", "#aaa"), 1500);
}

// Loop
setInterval(async () => {

  time++;

  document.getElementById("unix").textContent = time;

  const secret = document.getElementById("secret").value;

  const code = await generate(secret, time);

  document.getElementById("code").textContent =
    code.toString().padStart(6,"0");

  const r = remaining(time);

  document.getElementById("remaining").textContent =
    format(r);

  document.getElementById("bar").style.width =
    ((VALIDITY - r) / VALIDITY * 100) + "%";

}, 1000);
</script>

</body>
</html>
